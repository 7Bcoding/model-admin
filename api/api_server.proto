// -----
// job spec
message JobSpec {
  string                       image          =  1;
  string                       registryAuth   =  2;
  repeated string              env            =  3;
  repeated string              cmd            =  4;
  int64                        shmSize        =  5;
  string                       gpuProductName =  6;
  int32                        cpuNum         =  7;
  int32                        gpuNum         =  8;
  int64                        memorySize     =  9;
  int64                        rootfsSize     =  10;
  repeated Mount               volumeMounts   =  11 ;
}

message Job {
  string              id             = 1;
  JobSpec             spec           = 2;
  repeated InstVolume volumes        = 3;
  int32               maxRetryTimes  = 4;
  // ---
  // SaveImageAndPush
  // SyncData
  // SyncInstance
  // Custom
  string           type           = 5;
  JobState         state          = 6;
  // seconds
  int64            timeout        = 7;
  string           log            = 8;
}

message JobState {
  string state          = 1;
  string error          = 2;
  string errorMessage   = 3;
}

//create job
message CreateJobRequest {
  // job id
  string               id             = 1;
  // job inspect
  JobSpec              spec           = 2;
  // several volumes
  repeated  InstVolume volumes        = 3;
  // job max retry times
  int32                maxRetryTimes  = 4;
  // ---
  // SaveImageAndPush
  // SyncData
  // SyncInstance ?
  // Custom
  string              type           = 5;
  // seconds
  int64            timeout           = 6;
}

message CreateJobResponse {
  // created job
  Job job = 1;
}

message ListJobsRequest {
  // instance id
  string instanceId =  1;
  // job status
  string     state  =  2;
  // SaveImageAndPush
  // SyncData
  // SyncInstance ?
  // Custom
  string     type   =  3;
}

message ListJobsResponse {
  // list jobs
  repeated Job jobs = 1;
}

message DeleteJobRequest{
  // job id
  string id = 1;
}
message DeleteJobResponse{}
message GetJobRequest {
  // job id
  string id = 1;
}
message GetJobResponse {
  // get job
  Job job = 1;
}
