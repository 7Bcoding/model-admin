syntax = "proto3";

package nexus_api_server.api.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "nexus/api/nexus-api-server/v1;nexus_api_server_v1";

service NexusApi {
  // instance create
  rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse) {
    option (google.api.http) = {
      post: "/v1/instances"
      body: "*"
    };
  }
  // instance get
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse) {
    option (google.api.http) = {
      get: "/v1/instances/{id}"
    };
  }
  // instance inspect
  rpc InspectInstance(InspectInstanceRequest) returns (InspectInstanceResponse) {
    option (google.api.http) = {
      get: "/v1/instances-inspect/{id}"
    };
  }
  // instance update state
  rpc UpdateInstanceState(UpdateInstanceStateRequest)returns (UpdateInstanceStateResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/state"
      body: "*"
    };
  }
  // instance inspect list
  rpc ListInspectInstances(ListInspectInstancesRequest) returns (ListInspectInstancesResponse) {
    option (google.api.http) = {
      get: "/v1/instances-inspect"
    };
  }
  // instance list
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse) {
    option (google.api.http) = {
      get: "/v1/instances"
    };
  }

  rpc WatchReconcilerSet(WatchReconcilerSetRequest) returns (stream WatchReconcilerSetResponse) {

  }

  // instance start
  rpc StartInstance(StartInstanceRequest) returns (StartInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/start"
    };
  }
  // instance stop
  rpc StopInstance(StopInstanceRequest) returns (StopInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/stop"
    };
  }
  // instance delete
  rpc DeleteInstance(DeleteInstanceRequest) returns (DeleteInstanceResponse) {
    option (google.api.http) = {
      delete: "/v1/instances/{id}"
    };
  }
  // instance freeze
  rpc FreezeInstance(FreezeInstanceRequest) returns (FreezeInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/freeze"
    };
  }
  // instance unfreeze
  rpc UnFreezeInstance(UnFreezeInstanceRequest) returns (UnFreezeInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/unfreeze"
    };
  }
  // instance reschedule
  rpc ReSchedule(ReScheduleInstanceRequest) returns (ReScheduleInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/reschedule"
      body: "*"
    };
  }
  // instance scale down
  rpc ScaleDownInstance(ScaleDownInstanceRequest) returns (ScaleDownInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/scaleDown"
      body: "*"
    };
  }
  // instance start web terminal
  rpc StartInstanceWebTerminal(StartInstanceWebTerminalRequest) returns (StartInstanceWebTerminalResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/webterminal/start"
    };
  }
  // instance stop web terminal
  rpc StopInstanceWebTerminal(StopInstanceWebTerminalRequest) returns (StopInstanceWebTerminalResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/webterminal/stop"
    };
  }
  // instance reset
  rpc ResetInstance(ResetInstanceRequest) returns (ResetInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/reset"
      body: "*"
    };
  }
  // instance migrate
  rpc MigrateInstance(MigrateInstanceRequest) returns (MigrateInstanceResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/migrate"
    };
  }
  // instance set local volume
  rpc SetInstanceLocalVolume(SetInstanceLocalVolumeRequest) returns (SetInstanceLocalVolumeResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/local-volume"
      body: "*"
    };
  }
  // instance set expose ports
  rpc SetInstanceExposePorts(SetInstanceExposePortsRequest) returns (SetInstanceExposePortsResponse) {
    option (google.api.http) = {
      put: "/v1/instances/{id}/expose-ports"
      body: "*"
    };
  }
  // node get
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse) {
    option (google.api.http) = {
      get: "/v1/nodes/{id}"
    };
  }
  // node reconciler set get
  rpc GetNodeReconcilerSet(GetNodeReconcilerSetRequest) returns (GetNodeReconcilerSetResponse) {
    option (google.api.http) = {
      get: "/v1/nodes/{id}/reconcilersets"
    };
  }
  // node reconciler set update state
  rpc UpdateNodeReconcilerSetState(UpdateNodeReconcilerSetStateRequest) returns (UpdateNodeReconcilerSetStateResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/reconcilersets/state"
    };
  }

  // node daemon set get
  rpc GetNodeDaemonSet(GetNodeDaemonSetRequest) returns (GetNodeDaemonSetResponse) {
    option (google.api.http) = {
      get: "/v1/nodes/{id}/daemonsets"
    };
  }
  // node daemon set update state
  rpc UpdateNodeDaemonSetState(UpdateNodeDaemonSetStateRequest) returns (UpdateNodeDaemonSetStateResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/daemonsets"
    };
  }
  // node list
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
    option (google.api.http) = {
      get: "/v1/nodes"
    };
  }
  // node create
  rpc CreateNode(CreateNodeRequest) returns (CreateNodeResponse) {
    option (google.api.http) = {
      post: "/v1/nodes"
      body: "*"
    };
  }
  // node delete
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse) {
    option (google.api.http) = {
      delete: "/v1/nodes/{id}"
    };
  }
  // node set label
  rpc SetNodeLabel(SetNodeLabelRequest) returns (SetNodeLabelResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/label"
      body: "*"
    };
  }
  // node set schedulable
  rpc SetNodeSchedulable(SetNodeSchedulableRequest) returns (SetNodeSchedulableResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/schedulable"
      body: "*"
    };
  }
  // node set capacity
  rpc SetNodeCapacity(SetNodeCapacityRequest) returns (SetNodeCapacityResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/capacity"
      body: "*"
    };
  }
  // node select
  rpc SelectNode(SelectNodeRequest) returns (SelectNodeResponse) {
    option (google.api.http) = {
      get: "/v1/select/nodes"
    };
  }
  // node select by gpus
  rpc SelectNodeByGpus(SelectNodeByGpusRequest) returns (SelectNodeByGpusResponse) {
    option (google.api.http) = {
      get: "/v1/select/nodes/gpus"
    };
  }
  // node select by cpus
  rpc SelectNodeByCpu(SelectNodeByCpuRequest) returns (SelectNodeByCpuResponse) {
    option (google.api.http) = {
      get: "/v1/select/nodes/cpu"
    };
  }
  // node update state
  rpc UpdateNodeState(UpdateNodeStateRequest)returns (UpdateNodeStateResponse) {
    option (google.api.http) = {
      put: "/v1/nodes/{id}/state"
      body: "*"
    };
  }
  // forward get
  rpc GetForward(GetForwardRequest) returns (GetForwardResponse) {
    option (google.api.http) = {
      get: "/v1/forwards/{id}"
    };
  }
  // forward list
  rpc ListForwards(ListForwardsRequest) returns (ListForwardsResponse) {
    option (google.api.http) = {
      get: "/v1/forwards"
    };
  }
  // endpoint config get
  rpc GetEndpointConfigs(GetEndpointConfigsRequest) returns (GetEndpointConfigsResponse) {
    option (google.api.http) = {
      get: "/v1/endpointconfigs"
    };
  }
  // endpoint update state
  rpc UpdateEndpointStates(UpdateEndpointStatesRequest) returns (UpdateEndpointStatesResponse) {
    option (google.api.http) = {
      put: "/v1/endpointstates"
    };
  }
  // endpoint get
  rpc GetEndpoint(GetEndpointRequest) returns (GetEndpointResponse) {
    option (google.api.http) = {
      get: "/v1/endpoints/{id}"
    };
  }
  // endpoint list
  rpc ListEndpoints(ListEndpointsRequest) returns (ListEndpointsResponse) {
    option (google.api.http) = {
      get: "/v1/endpoints"
    };
  }
  // endpoint create
  rpc CreateEndpoint(CreateEndpointRequest) returns (CreateEndpointResponse) {
    option (google.api.http) = {
      post: "/v1/endpoints"
      body: "*"
    };
  }
  // token generate
  rpc GenerateToken(GenerateTokenRequest) returns(GenerateTokenResponse) {
    option (google.api.http) = {
      post: "/v1/token"
      body: "*"
    };
  }
  // token get
  rpc GetToken(GetTokenRequest) returns(GetTokenResponse) {
    option (google.api.http) = {
      get: "/v1/token/{role}/{name}"
    };
  }
  // token revoke
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse) {
    option (google.api.http) = {
      delete: "/v1/token"
    };
  }
  // network volume create
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse) {
    option (google.api.http) = {
      post: "/v1/volumes"
      body: "*"
    };
  }
  // network volume delete
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse) {
    option (google.api.http) = {
      delete: "/v1/volumes"
    };
  }
  // network volume set size
  rpc SetVolume(SetVolumeRequest) returns (SetVolumeResponse) {
    option (google.api.http) = {
      put: "/v1/volumes/{id}/size"
      body: "*"
    };
  }
  // network volume update state
  rpc UpdateVolumeState(UpdateVolumeStateRequest) returns (UpdateVolumeStateResponse) {
    option (google.api.http) = {
      put: "/v1/volumes/{id}/state"
      body: "*"
    };
  }
  // network volume get
  rpc GetVolume(GetVolumeRequest) returns (GetVolumeResponse) {
    option (google.api.http) = {
      get: "/v1/volumes/{id}"
    };
  }
  // network volume list
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse) {
    option (google.api.http) = {
      get: "/v1/volumes"
    };
  }
  // network create
  rpc CreateNetwork(CreateNetworkRequest) returns (CreateNetworkResponse) {
    option (google.api.http) = {
      post: "/v1/networks"
      body: "*"
    };
  }
  // network delete
  rpc DeleteNetwork(DeleteNetworkRequest) returns (DeleteNetworkResponse) {
    option (google.api.http) = {
      delete: "/v1/networks"
    };
  }
  // network update state
  rpc UpdateNetworkState(UpdateNetworkStateRequest) returns (UpdateNetworkStateResponse) {
    option (google.api.http) = {
      put: "/v1/networks/{id}/state"
      body: "*"
    };
  }
  // network get
  rpc GetNetwork(GetNetworkRequest) returns (GetNetworkResponse) {
    option (google.api.http) = {
      get: "/v1/networks/{id}"
    };
  }
  // network list
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse) {
    option (google.api.http) = {
      get: "/v1/networks"
    };
  }

  // cluster info get
  rpc GetClusterInfo(GetClusterInfoRequest) returns (GetClusterInfoResponse) {
    option (google.api.http) = {
      get: "/v1/cluster"
    };
  }
  // endpoint agent list
  rpc ListEndpointAgent(CommonListRequest) returns (ListEndpointAgentResponse) {
    option (google.api.http) = {
      get: "/v1/agent/endpoint"
    };
  }
  // endpoint agent get
  rpc GetEndpointAgent(CommonGetRequest) returns (GetEndpointAgentResponse) {
    option (google.api.http) = {
      get: "/v1/agent/endpoint/{id}"
    };
  }
  // endpoint agent register
  rpc RegisterEndpointAgent(RegisterEndpointAgentRequest) returns (RegisterEndpointAgentResponse) {
    option (google.api.http) = {
      post: "/v1/agent/endpoint"
      body: "*"
    };
  }
  // endpoint agent update
  rpc UpdateEndpointAgent(UpdateEndpointAgentRequest) returns (UpdateEndpointAgentResponse) {
    option (google.api.http) = {
      put: "/v1/agent/endpoint"
      body: "*"
    };
  }
  // endpoint agent unregister
  rpc UnRegisterEndpointAgent(UnRegisterEndpointAgentRequest) returns (UnRegisterEndpointAgentResponse) {
