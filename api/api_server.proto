// --- Inst
enum SshMode {
  DISABLE = 0;
  PASSWORD = 1;
  PUBLIC_KEY = 2;
  ALL = 3;
}

message CommonListRequest {
}

message CommonGetRequest {
  string id = 1 [(validate.rules).string.min_len = 1];
}

message ContainerSpec {
  optional string              name           =  1;
  string                       image          =  2  [(validate.rules).string.min_len = 1];
  string                       registryAuth   =  3;
  repeated string              env            =  4;
  repeated string              cmd            =  5;
  int64                        shmSize        =  6  [(validate.rules).int64.gt = 0];
  string                       gpuProductName =  7  ;
  int32                        cpuNum         =  8  [(validate.rules).int32.gte = 0];
  int32                        gpuNum         =  9  ;
  int64                        memorySize     =  10 [(validate.rules).int64.gte = 4194304];
  int64                        rootfsSize     =  11 [(validate.rules).int64.gte = 1073741824];
  repeated Mount               volumeMounts   =  12 ;
  // [80/tcp, 9000/http]
  repeated string              exposePorts    = 13;
  SshMode                      sshMode        = 14;
  string                       sshPassword    = 15;
  repeated string              sshPublicKeys  = 16;
  map<string, string>          label          = 17;
  repeated string              entrypoint     = 18;
}

message Mount {
  string volume     = 1 [(validate.rules).string.min_len = 1];
  string mountPoint = 2 [(validate.rules).string.min_len = 1];
  bool readonly = 3;
}

// local volume name uuid
message InstVolume {
  string type = 1 [(validate.rules).string = { in: [ "local", "network"] }];
  int64  size = 2 ;
  string id   = 3 ; // uuid; local storage generate & network volume use return id
}

message InstState {
  // example：creating，pulling，running，stopping，exited，starting，resetting
  string state          = 1 [(validate.rules).string.min_len = 1];
  string error          = 2;
  string errorMessage   = 3;
  repeated int32 gpuIds = 4;
  repeated int32 cpuIds = 5;
  // singleNuma singleSocket singleDevice
  string affinityMode   = 6 [(validate.rules).string = { in: [ "singleNuma", "singleSocket", "singleDevice"] }];
  string rwLayerId     = 7;
}

message ExposePortState {
  string port          = 1 [(validate.rules).string.min_len = 1];
  string exposeAddress = 2 [(validate.rules).string.min_len = 1];
  bool   online        = 3;
}

message WebTerminalState {
  bool   running  = 1;
  string address  = 2;
  string username = 3;
  string password = 4;
}

message SshState {
  bool   running     = 1;
  string sshCommand  = 2;
  string sshPassword = 3;
}

message LogState {
  bool   running            = 1;
  string systemLogAddress   = 2;
  string instanceLogAddress = 3;
}

message Apps {
  WebTerminalState webTerminalState = 1;
  SshState         sshState         = 2;
  LogState         logState         = 3;
}


message InstNetwork {
  string id = 1;
  string ip = 2;
}

message Instance {
  string                   id               = 1;
  ContainerSpec            containers       = 2;
  repeated InstVolume      volumes          = 3;
  string                   nodeId           = 5;
  repeated ExposePortState exposePortStates = 6;
  InstState                state            = 7;
  // all svc state and use case
  Apps                     apps             = 8;
  string                   kind             = 9;
  InstNetwork              network         = 11;
}

message ReconcilerSetNotify {
  string event = 1  [(validate.rules).string = { in: [ "add", "delete", "modify"] }];
  string instanceId = 2;
  string reconcilerset = 3;
}

// -- Inst END

//message Affinity {
//  int64 cpuPer = 1;
//}

// -- Node
message NodeSpec {
  string provider         =  1 [(validate.rules).string.min_len = 1];
  string cpuProductName   =  2 [(validate.rules).string.min_len = 1];
  int64  memoryReserved   =  3 [(validate.rules).int64.gte = 0];
  string gpuProductName   =  4 ;
  int64  gpuMemorySize    =  5 ;
  string cudaVersion      =  6 ;
  string rootfsType       =  7 [(validate.rules).string.min_len = 1];
  string localStorageType =  8 [(validate.rules).string.min_len = 1];
  map<string, string> affinity       =  9;
  // cpu use by gpu per
  int64               cpuPer         = 10;
}

message CpuSet {
  repeated int32 cpuSet = 1 [(validate.rules).repeated.min_items = 1];
}

message GpuSet {
  repeated int32 gpuSet = 1 [(validate.rules).repeated.min_items = 1];
}

message Affinity {
  repeated int32 cpuSet = 1 [(validate.rules).repeated.min_items = 1];
  repeated int32 gpuSet = 2 [(validate.rules).repeated.min_items = 1];
  repeated CpuSet socketCpuSet = 3;
  repeated GpuSet socketGpuSet = 4;
  repeated CpuSet numaCpuSet = 5;
  repeated GpuSet numaGpuSet = 6;
}

message NodeCapacity {
  int32 cpuNum           = 1 [(validate.rules).int32.gte = 1];
  int32 gpuNum           = 2 ;
  int64 memorySize       = 3 [(validate.rules).int64.gte = 1073741824];
  int64 rootfsSize       = 4 [(validate.rules).int64.gte = 10737418240];
  int64 localStorageSize = 5 [(validate.rules).int64.gte = 10737418240];
}

message NodeAllocable {
  int32 cpuNum            = 1;
  int32 gpuNum            = 2;
  int64 memorySize        = 3;
  int64 rootfsSize        = 4;
  int64 localStorageSize  = 5;
  // index cpu id; value 1 use 0 available
  repeated int32 cpuState = 6;
  // index gpu id; value 1 use 0 available
  repeated int32 gpuState = 7;
}

message NodeConfig {
  string publicKey = 1;
}

message NodeState {
  string state        = 1 [(validate.rules).string.min_len = 1];
  string error        = 2;
  string errorMessage = 3;

  repeated string instIds = 4;
  repeated CpuUsage cpuUsedBy = 5;
  repeated GpuUsage gpuUsedBy = 6;
  string gpuProductName = 7;
  int64 gpuMemorySize = 8;
  string cudaVersion = 9;
  int64 memorySizeUsed = 10;
  int64 memorySizeTotal = 11;
  int64 rootfsSizeUsed = 12;
  int64 rootfsSizeTotal = 13;
  int64 localStorageSizeUsed = 14;
  int64 localStorageSizeTotal = 15;
  google.protobuf.Timestamp  updateAt = 16;
  string ip = 17;
}

message CpuUsage {
  repeated string instanceIds = 1;
}

message GpuUsage {
  repeated string instanceIds = 1;
}


message Node {
  string              id        = 1;
  string              name      = 2;
  map<string, string> label     = 3;
  NodeSpec            spec      = 4;
  NodeCapacity        capacity  = 5;
  NodeAllocable       allocable = 6;
  bool                schedulable = 7;
  NodeState           state     = 8;
  int64               version   = 9;
  NodeConfig          config    = 10;
}
// --- Node End


message InspectInstanceRequest {
  string id         = 1;
  // only version GT value return instance
  int64  versionGT  = 2;
}

// --- cluster
message Support {
  bool networkVolume   = 1;
  bool tcpPortMapping  = 2;
  bool httpPortMapping = 3;
  bool vpc             = 4;
}

message PublicVolume {
  string id = 1;
  string type = 2;
  string localPath = 3;
  string category = 4;
  string mountPath = 5;
  bool readonly = 6;
  int64 size = 7;
}

message Cluster {
  string  version                = 1;
  string  name                   = 2;
  string  region                 = 3;
  string  type                   = 4 [(validate.rules).string = { in: [ "center ", "edge"] }];
  Support support                = 5;
  repeated PublicVolume publicVolumes = 6;
}
// ---- cluster End

// --- cluster Volume
message NetworkVolumeState {
  string state        = 1 [(validate.rules).string.min_len = 1]; // creating  expanding ready
  string error        = 2;
  string errorMessage = 3;
}

message NetworkVolume {
  string                    id       = 1;
  int64                     size     = 2;
  string                    type     = 3;
  NetworkVolumeState        state    = 4;
  map<string, string>       metadata = 5;
  int64                     version  = 6;
  string                    createAt = 7; //create time
  string                    updateAt = 8; //update time
}
// --- cluster Volume End

// ---- Network

message NetworkState {
  string state = 1 [(validate.rules).string.min_len = 1];
  string error = 2;
  string dockerNetworkID = 3;
}

message Null {}

message Network {
