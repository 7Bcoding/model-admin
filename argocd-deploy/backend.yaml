apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-ops-backend
  namespace: llm-ops
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: llm-ops-backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: llm-ops-backend
    spec:
      containers:
      - image: image.ppinfra.com/llm-ops/backend:0.6.8
        imagePullPolicy: IfNotPresent
        name: backend
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app/config/config.yaml
          name: config-volume
          subPath: config.yaml
        - mountPath: /app/kubeconfig
          name: kubeconfig-volume
          subPath: kubeconfig
        - mountPath: /app/kubeconfig-v2
          name: kubeconfig-volume-v2
          subPath: kubeconfig
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: ppinfra-registry-secret
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: llm-ops-config
        name: config-volume
      - configMap:
          defaultMode: 420
          name: llm-ops-kubeconfig
        name: kubeconfig-volume
      - configMap:
          defaultMode: 420
          name: llm-ops-kubeconfig-v2
        name: kubeconfig-volume-v2