apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-ops-backend
  namespace: llm-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-ops-backend
  template:
    metadata:
      labels:
        app: llm-ops-backend
    spec:
      imagePullSecrets:
      - name: ppinfra-registry-secret
      containers:
      - name: backend
        image: image.ppinfra.com/llm-ops/backend:0.4.3
        ports:
        - containerPort: 8080
        env:
        - name: ALL_PROXY
          value: "socks5h://10.1.241.35:1080"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config/config.yaml
          subPath: config.yaml
        - name: kubeconfig-volume
          mountPath: /app/kubeconfig
          subPath: kubeconfig
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: config-volume
        configMap:
          name: llm-ops-config
      - name: kubeconfig-volume
        configMap:
          name: llm-ops-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: llm-ops-backend
  namespace: llm-ops
spec:
  selector:
    app: llm-ops-backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP 