apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-ops-ingress
  namespace: llm-ops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: llm-ops.example.com  # 替换为实际的域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: llm-ops-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: llm-ops-backend
            port:
              number: 8080 