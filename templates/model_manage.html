{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- 模型信息编辑 -->
    <div class="col-md-12 mb-4">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title mb-0">模型信息管理</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('update_model', model_name=model_data.model.model_name) }}" method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">模型名称</label>
                                <input type="text" class="form-control" value="{{ model_data.model.model_name }}" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">描述</label>
                                <textarea class="form-control" name="description" rows="3">{{ model_data.model.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">上下文大小</label>
                                <input type="number" class="form-control" name="context_size" value="{{ model_data.model.context_size }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">输入Token价格</label>
                                <input type="number" class="form-control" name="input_price" value="{{ model_data.model.input_token_price_per_million }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">输出Token价格</label>
                                <input type="number" class="form-control" name="output_price" value="{{ model_data.model.output_token_price_per_million }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Stop Tokens (用逗号分隔)</label>
                                <input type="text" class="form-control" name="stops" value="{{ model_data.model.default_stops|join(',') }}">
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" name="private" value="true" 
                                           {% if model_data.model.is_private %}checked{% endif %}>
                                    <label class="form-check-label">私有模型</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">保存模型信息</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Endpoints 管理 -->
    <div class="col-md-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">Endpoints 管理</h3>
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEndpointModal">
                    <i class="bi bi-plus-circle"></i> 添加 Endpoint
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Endpoint ID</th>
                                <th>URL</th>
                                <th>权重</th>
                                <th>状态</th>
                                <th>健康检查</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for endpoint in model_data.endpoints %}
                            <tr>
                                <td><code>{{ endpoint.endpoint_id }}</code></td>
                                <td><small>{{ endpoint.url }}</small></td>
                                <td>
                                    <form action="{{ url_for('update_endpoint', model_name=model_data.model.model_name, endpoint_id=endpoint.endpoint_id) }}" 
                                          method="POST" class="d-flex align-items-center">
                                        <input type="number" class="form-control form-control-sm" 
                                               name="weight" value="{{ endpoint.weight }}" style="width: 100px">
                                        <button type="submit" class="btn btn-sm btn-outline-primary ms-2">更新</button>
                                    </form>
                                </td>
                                <td>
                                    <form action="{{ url_for('update_endpoint', model_name=model_data.model.model_name, endpoint_id=endpoint.endpoint_id) }}" 
                                          method="POST">
                                        <select name="status" class="form-select form-select-sm" onchange="this.form.submit()">
                                            <option value="ENDPOINT_STATUS_SERVING" 
                                                    {% if endpoint.status == 'ENDPOINT_STATUS_SERVING' %}selected{% endif %}>
                                                运行中
                                            </option>
                                            <option value="ENDPOINT_STATUS_DELETED" 
                                                    {% if endpoint.status == 'ENDPOINT_STATUS_DELETED' %}selected{% endif %}>
                                                已停用
                                            </option>
                                        </select>
                                    </form>
                                </td>
                                <td>
                                    <form action="{{ url_for('update_endpoint', model_name=model_data.model.model_name, endpoint_id=endpoint.endpoint_id) }}" 
                                          method="POST">
                                        <div class="form-check form-switch">
                                            <input type="checkbox" class="form-check-input" name="enable_check_health" 
                                                   value="true" onchange="this.form.submit()"
                                                   {% if endpoint.enable_check_health %}checked{% endif %}>
                                        </div>
                                    </form>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-danger" 
                                            onclick="if(confirm('确定要删除这个Endpoint吗？')) { 
                                                document.getElementById('deleteEndpoint{{ loop.index }}').submit(); 
                                            }">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                    <form id="deleteEndpoint{{ loop.index }}" 
                                          action="{{ url_for('update_endpoint', model_name=model_data.model.model_name, endpoint_id=endpoint.endpoint_id) }}" 
                                          method="POST" style="display: none;">
                                        <input type="hidden" name="status" value="ENDPOINT_STATUS_DELETED">
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加 Endpoint 模态框 -->
<div class="modal fade" id="addEndpointModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加新的 Endpoint</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="{{ url_for('add_endpoint', model_name=model_data.model.model_name) }}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Endpoint ID</label>
                        <input type="text" class="form-control" name="endpoint_id" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL</label>
                        <input type="url" class="form-control" name="url" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">权重</label>
                        <input type="number" class="form-control" name="weight" value="1" required>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" name="enable_check_health" value="true">
                            <label class="form-check-label">启用健康检查</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
