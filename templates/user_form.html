{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{% if user is defined %}编辑用户{% else %}添加用户{% endif %}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" name="username" 
                               value="{{ user.username if user is defined else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">账号</label>
                        <input type="text" class="form-control" name="account_name" 
                               value="{{ user.account_name if user is defined else '' }}"
                               {{ 'readonly' if user is defined else '' }} required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码{{ ' (留空保持不变)' if user is defined else '' }}</label>
                        <input type="password" class="form-control" name="password"
                               {{ 'required' if user is not defined else '' }}>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <select class="form-select" name="role" required>
                            {% for role in roles %}
                            <option value="{{ role.value }}"
                                    {{ 'selected' if user is defined and user.role == role.value else '' }}>
                                {{ role.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('list_users') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
